name: Deploy Diamond Salon Ocala

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate website
        run: |
          npm run lint
          npm run typecheck

      - name: Build GitHub Pages site
        env:
          VITE_BASE_PATH: /diamondsalonocala/
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build:pages

      - name: Verify Pages artifact
        shell: bash
        run: |
          test -f client/dist/index.html
          test -f client/dist/404.html
          test -f client/dist/.nojekyll
          grep -q '/diamondsalonocala/assets/' client/dist/index.html
          cmp --silent client/dist/index.html client/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
